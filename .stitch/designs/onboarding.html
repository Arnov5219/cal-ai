<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Cal AI Onboarding</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#930df2",
                        "background-light": "#f7f5f8",
                        "background-dark": "#0a0a0c",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .glass-card {
            background: rgba(147, 13, 242, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .ai-orb {
            background: radial-gradient(circle at 30% 30%, #930df2, #4f46e5);
            filter: blur(40px);
            opacity: 0.6;
        }
        .orb-core {
            background: conic-gradient(from 180deg at 50% 50%, #930df2 0deg, #3b82f6 120deg, #f472b6 240deg, #930df2 360deg);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased overflow-x-hidden min-h-screen flex flex-col items-center justify-between">
<!-- Background Ambient Glows -->
<div class="fixed top-0 left-0 w-full h-full pointer-events-none z-0">
<div class="absolute top-[-10%] left-[-10%] w-64 h-64 ai-orb"></div>
<div class="absolute bottom-[-5%] right-[-5%] w-80 h-80 ai-orb" style="filter: blur(60px); opacity: 0.3;"></div>
</div>
<!-- Main Content Container -->
<div class="relative z-10 w-full max-w-[430px] h-screen flex flex-col p-6 overflow-y-auto">
<!-- Header / Close -->
<div class="flex items-center justify-between mb-8">
<button class="p-2 rounded-full hover:bg-white/5 transition-colors">
<span class="material-symbols-outlined text-slate-400">close</span>
</button>
<div class="flex items-center gap-2">
<div class="w-2 h-2 rounded-full bg-primary shadow-[0_0_8px_rgba(147,13,242,0.8)]"></div>
<span class="text-xs font-semibold tracking-widest uppercase text-slate-400">Cal AI Premium</span>
</div>
<div class="w-10"></div> <!-- Spacer -->
</div>
<!-- AI Orb Visual -->
<div class="flex justify-center mb-10">
<div class="relative w-40 h-40 flex items-center justify-center">
<div class="absolute inset-0 orb-core rounded-full opacity-40 blur-xl"></div>
<div class="relative w-32 h-32 rounded-full orb-core shadow-2xl flex items-center justify-center overflow-hidden border border-white/20">
<div class="absolute inset-0 bg-gradient-to-tr from-black/40 to-transparent"></div>
<span class="material-symbols-outlined text-white text-5xl opacity-80">blur_on</span>
</div>
</div>
</div>
<!-- Typography Section -->
<div class="text-center mb-10">
<h1 class="text-3xl font-bold tracking-tight text-white mb-4 leading-tight">
                Reach your goals <br/> with Cal AI
            </h1>
<p class="text-slate-400 text-lg font-medium px-4">
                Experience the future of nutrition tracking with AI-powered insight.
            </p>
</div>
<!-- Goal Selection Grid -->
<div class="flex flex-col gap-4 mb-10">
<!-- Selected Card -->
<label class="relative group cursor-pointer">
<input checked="" class="peer hidden" name="goal" type="radio"/>
<div class="glass-card rounded-2xl p-5 flex items-center gap-5 transition-all duration-300 peer-checked:border-primary peer-checked:bg-primary/10 peer-checked:ring-2 peer-checked:ring-primary/50">
<div class="flex-shrink-0 w-12 h-12 rounded-xl bg-primary/20 flex items-center justify-center text-primary">
<span class="material-symbols-outlined text-3xl">monitor_weight</span>
</div>
<div class="flex-grow">
<h3 class="text-white font-semibold text-lg">Lose Weight</h3>
<p class="text-slate-400 text-sm">Burn fat and feel lighter</p>
</div>
<div class="w-6 h-6 rounded-full border-2 border-slate-700 flex items-center justify-center peer-checked:border-primary">
<div class="w-3 h-3 rounded-full bg-primary opacity-0 peer-checked:opacity-100 transition-opacity"></div>
</div>
</div>
</label>
<!-- Card 2 -->
<label class="relative group cursor-pointer">
<input class="peer hidden" name="goal" type="radio"/>
<div class="glass-card rounded-2xl p-5 flex items-center gap-5 transition-all duration-300 peer-checked:border-primary peer-checked:bg-primary/10 peer-checked:ring-2 peer-checked:ring-primary/50">
<div class="flex-shrink-0 w-12 h-12 rounded-xl bg-slate-800/50 flex items-center justify-center text-slate-300">
<span class="material-symbols-outlined text-3xl">balance</span>
</div>
<div class="flex-grow">
<h3 class="text-white font-semibold text-lg">Maintain Weight</h3>
<p class="text-slate-400 text-sm">Keep your current progress</p>
</div>
<div class="w-6 h-6 rounded-full border-2 border-slate-700 flex items-center justify-center transition-colors">
</div>
</div>
</label>
<!-- Card 3 -->
<label class="relative group cursor-pointer">
<input class="peer hidden" name="goal" type="radio"/>
<div class="glass-card rounded-2xl p-5 flex items-center gap-5 transition-all duration-300 peer-checked:border-primary peer-checked:bg-primary/10 peer-checked:ring-2 peer-checked:ring-primary/50">
<div class="flex-shrink-0 w-12 h-12 rounded-xl bg-slate-800/50 flex items-center justify-center text-slate-300">
<span class="material-symbols-outlined text-3xl">fitness_center</span>
</div>
<div class="flex-grow">
<h3 class="text-white font-semibold text-lg">Gain Muscle</h3>
<p class="text-slate-400 text-sm">Build strength and mass</p>
</div>
<div class="w-6 h-6 rounded-full border-2 border-slate-700 flex items-center justify-center transition-colors">
</div>
</div>
</label>
</div>
<!-- Primary Button -->
<div class="mt-auto pb-8">
<button class="w-full bg-primary hover:bg-opacity-90 text-white font-bold py-5 rounded-2xl shadow-[0_0_20px_rgba(147,13,242,0.4)] transition-all flex items-center justify-center gap-2 group">
<span>Get Started</span>
<span class="material-symbols-outlined text-xl group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
<p class="text-center text-slate-500 text-xs mt-4 px-8">
                By continuing, you agree to our Terms of Service and Privacy Policy.
            </p>
</div>
</div>
<!-- Background Decoration -->
<div class="absolute top-0 right-0 p-8 opacity-20 hidden @[480px]:block">
<div class="grid grid-cols-2 gap-2">
<div class="w-1 h-1 bg-white rounded-full"></div>
<div class="w-1 h-1 bg-white rounded-full"></div>
<div class="w-1 h-1 bg-white rounded-full"></div>
<div class="w-1 h-1 bg-white rounded-full"></div>
</div>
</div>
</body></html>

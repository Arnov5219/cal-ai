<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Cal AI Dashboard</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#930df2",
                        "background-light": "#f7f5f8",
                        "background-dark": "#0a0a0c",
                        "accent-teal": "#2dd4bf",
                        "accent-orange": "#fb923c",
                        "accent-pink": "#f472b6",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .ring-gradient {
            background: conic-gradient(from 0deg, #930df2 0%, #3b82f6 70%, transparent 70%);
        }
        .glow-primary {
            box-shadow: 0 0 20px rgba(147, 13, 242, 0.4);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-dark font-display text-slate-100 antialiased">
<div class="relative mx-auto flex min-h-screen max-w-md flex-col overflow-hidden bg-background-dark pb-32">
<!-- Top Header -->
<header class="flex items-center justify-between px-6 pt-8 pb-4">
<div class="flex flex-col">
<p class="text-xs font-semibold uppercase tracking-widest text-slate-500">Overview</p>
<h1 class="text-2xl font-extrabold tracking-tight text-slate-100">Today, Dec 12</h1>
</div>
<div class="size-11 rounded-full border-2 border-primary/30 p-0.5">
<div class="h-full w-full rounded-full bg-cover bg-center" data-alt="User profile avatar smiling young man" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuDGO5BjZepzs2BMssnCUK6tIv064n2hN6jn-erS2XWlSxs_Otw-AvCVsJIUJFtvLVkyj_PRDTf5iMPvXsaIxV1OSDDsD451RWJCAtBnsSVCgQPN0OIaolbzKJV9s-OlmweUi3RVyXP4crvsX1vbcE-Vj280eh2no96m5Refv3bpJv5tmm58-IKoVoo8DC9mFB8VNyEj6D13UjQB_cUteUetF9DOfJMHQ6H2uRYCraYNgXpdIpceZiyVff_3PyBQhZsNWJI1Ssfh3Os')"></div>
</div>
</header>
<!-- Date Scroller -->
<div class="flex gap-3 overflow-x-auto px-6 py-2 no-scrollbar">
<div class="flex min-w-[56px] flex-col items-center justify-center rounded-2xl bg-white/5 py-3 border border-white/5">
<span class="text-[10px] font-bold uppercase text-slate-500">Mon</span>
<span class="text-sm font-bold">11</span>
</div>
<div class="flex min-w-[56px] flex-col items-center justify-center rounded-2xl bg-primary py-3 text-white shadow-lg shadow-primary/30">
<span class="text-[10px] font-bold uppercase opacity-80">Tue</span>
<span class="text-sm font-bold">12</span>
</div>
<div class="flex min-w-[56px] flex-col items-center justify-center rounded-2xl bg-white/5 py-3 border border-white/5">
<span class="text-[10px] font-bold uppercase text-slate-500">Wed</span>
<span class="text-sm font-bold">13</span>
</div>
<div class="flex min-w-[56px] flex-col items-center justify-center rounded-2xl bg-white/5 py-3 border border-white/5">
<span class="text-[10px] font-bold uppercase text-slate-500">Thu</span>
<span class="text-sm font-bold">14</span>
</div>
<div class="flex min-w-[56px] flex-col items-center justify-center rounded-2xl bg-white/5 py-3 border border-white/5">
<span class="text-[10px] font-bold uppercase text-slate-500">Fri</span>
<span class="text-sm font-bold">15</span>
</div>
</div>
<!-- Hero Section: Calorie Ring -->
<section class="relative flex items-center justify-center py-10">
<div class="relative flex h-64 w-64 items-center justify-center">
<!-- Outer Track -->
<div class="absolute inset-0 rounded-full border-[14px] border-white/5"></div>
<!-- Progress Ring -->
<div class="ring-gradient absolute inset-0 rounded-full border-[14px] border-transparent opacity-90 blur-[1px]"></div>
<!-- Inner Glow Content -->
<div class="flex flex-col items-center text-center">
<span class="text-5xl font-black tracking-tighter text-slate-100">1,450</span>
<span class="text-sm font-medium tracking-wide text-slate-400">Calories Left</span>
<div class="mt-2 flex items-center gap-1 text-[10px] font-bold text-primary">
<span class="material-symbols-outlined !text-xs">bolt</span>
                        GOAL: 2,200
                    </div>
</div>
</div>
</section>
<!-- Macros Section -->
<section class="px-6">
<div class="mb-4 flex items-center justify-between">
<h2 class="text-lg font-bold tracking-tight">Macros</h2>
<span class="text-xs font-semibold text-primary">Details</span>
</div>
<div class="grid grid-cols-3 gap-3">
<!-- Protein Card -->
<div class="glass flex flex-col rounded-2xl p-4">
<span class="text-[10px] font-bold uppercase tracking-wider text-accent-teal">Protein</span>
<div class="my-2 flex items-baseline gap-1">
<span class="text-xl font-bold">85</span>
<span class="text-[10px] text-slate-500">g</span>
</div>
<div class="h-1 w-full rounded-full bg-white/5">
<div class="h-full w-[65%] rounded-full bg-accent-teal shadow-[0_0_8px_rgba(45,212,191,0.5)]"></div>
</div>
</div>
<!-- Carbs Card -->
<div class="glass flex flex-col rounded-2xl p-4">
<span class="text-[10px] font-bold uppercase tracking-wider text-accent-orange">Carbs</span>
<div class="my-2 flex items-baseline gap-1">
<span class="text-xl font-bold">142</span>
<span class="text-[10px] text-slate-500">g</span>
</div>
<div class="h-1 w-full rounded-full bg-white/5">
<div class="h-full w-[45%] rounded-full bg-accent-orange shadow-[0_0_8px_rgba(251,146,60,0.5)]"></div>
</div>
</div>
<!-- Fat Card -->
<div class="glass flex flex-col rounded-2xl p-4">
<span class="text-[10px] font-bold uppercase tracking-wider text-accent-pink">Fat</span>
<div class="my-2 flex items-baseline gap-1">
<span class="text-xl font-bold">42</span>
<span class="text-[10px] text-slate-500">g</span>
</div>
<div class="h-1 w-full rounded-full bg-white/5">
<div class="h-full w-[80%] rounded-full bg-accent-pink shadow-[0_0_8px_rgba(244,114,182,0.5)]"></div>
</div>
</div>
</div>
</section>
<!-- Today's Log -->
<section class="mt-8 px-6">
<div class="mb-4 flex items-center justify-between">
<h2 class="text-lg font-bold tracking-tight">Today's Log</h2>
<span class="material-symbols-outlined text-slate-400">add_circle</span>
</div>
<div class="flex flex-col gap-3">
<!-- Breakfast -->
<div class="glass flex items-center gap-4 rounded-2xl p-3">
<div class="h-14 w-14 rounded-xl bg-cover bg-center shadow-inner" data-alt="Bowl of oatmeal with fresh berries" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuAPBB0N-I_C6EEJz57xLaJH_h4ng6O5-E7bDmYvmXq81m7PrRtRRUzrCjER4H2wGc0M_7ZeiwdT9L0Gcd6opY1r7cN6fg0ZPsi1DGIQIQuk8mUOgGlQlh9dbyqUf82ZDKg-kvon4jzAmtncH9AIAjMs2tcyzaieu7mN322GzKPo7x1bfElj9CzT9B4PhaQNjzTt9tKJS2wSBBW6lf2m8BKzUpG6xu91AkPH_s9Vn_9sHH1JaClBqbUP6gR60XGCELfqmS9uMShkHe4')"></div>
<div class="flex flex-1 flex-col">
<span class="text-xs font-bold text-slate-500">Breakfast</span>
<span class="text-sm font-semibold">Oatmeal &amp; Berries</span>
</div>
<div class="text-right">
<span class="block text-sm font-bold">320</span>
<span class="text-[10px] font-medium text-slate-500 uppercase">kcal</span>
</div>
</div>
<!-- Lunch -->
<div class="glass flex items-center gap-4 rounded-2xl p-3">
<div class="h-14 w-14 rounded-xl bg-cover bg-center shadow-inner" data-alt="Healthy chicken salad with greens" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuABlJmXiwvdWLGkJ2Cu3630Oyj9CT_I5eACikMBLFBDsZ6qGk7qsQPrN-ElaLH_a2lUcEFpt5IvVQ3enYks0kdx3rfyvWwJMJnC7VQn1kpLT6Cz914gAJ3Zqd86qyhnMJtGnC4vNO2kVlokd52uq-PL_ibfwwjMPptCf17rxlXmA5rMr1AE4az8yEuzfC5_axNKjP4Lq_eaZxePM_3N378hDRRz-Mfi0nykZQRqhh-1usEgNhZP9arvKrNyM95xBP6itd-b7hcKFHQ')"></div>
<div class="flex flex-1 flex-col">
<span class="text-xs font-bold text-slate-500">Lunch</span>
<span class="text-sm font-semibold">Chicken Salad</span>
</div>
<div class="text-right">
<span class="block text-sm font-bold">450</span>
<span class="text-[10px] font-medium text-slate-500 uppercase">kcal</span>
</div>
</div>
</div>
</section>
<!-- Bottom Navigation -->
<nav class="fixed bottom-0 left-0 right-0 z-50 mx-auto max-w-md p-6">
<div class="glass flex h-18 items-center justify-between rounded-full px-8 py-3 shadow-2xl">
<a class="flex flex-col items-center text-primary" href="#">
<span class="material-symbols-outlined !text-2xl">home</span>
<span class="text-[10px] font-bold">Home</span>
</a>
<!-- Floating AI Assistant Button -->
<div class="relative -top-8">
<button class="glow-primary flex h-16 w-16 items-center justify-center rounded-full bg-gradient-to-tr from-primary to-blue-500 text-white shadow-xl ring-4 ring-background-dark">
<span class="material-symbols-outlined !text-3xl">auto_awesome</span>
</button>
</div>
<a class="flex flex-col items-center text-slate-500 hover:text-primary" href="#">
<span class="material-symbols-outlined !text-2xl">trending_up</span>
<span class="text-[10px] font-bold">Trends</span>
</a>
<a class="flex flex-col items-center text-slate-500 hover:text-primary" href="#">
<span class="material-symbols-outlined !text-2xl">person</span>
<span class="text-[10px] font-bold">Profile</span>
</a>
</div>
</nav>
<!-- Aesthetic Background Glows -->
<div class="fixed top-[-10%] left-[-10%] -z-10 h-[400px] w-[400px] rounded-full bg-primary/10 blur-[120px]"></div>
<div class="fixed bottom-[-10%] right-[-10%] -z-10 h-[400px] w-[400px] rounded-full bg-blue-500/10 blur-[120px]"></div>
</div>
</body></html>
